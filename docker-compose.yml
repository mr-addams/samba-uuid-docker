services:
  samba-nfs:
    build: .
    container_name: samba-nfs-exclusive
    # privileged: true and devices: /dev:/dev are required for:
    # - mounting real host block devices (mount -t ext4 /dev/sdX /shares/...)
    # - loading kernel modules (modprobe nfsd, rpc.nfsd, rpc.mountd)
    # - accessing /dev/disk/by-uuid to discover disks by UUID
    # ⚠️ RISK: container compromise equals host compromise. Use only
    # in a trusted network environment.
    privileged: true
    devices:
      - /dev:/dev
    ports:
      - "445:445"
      - "139:139"
      - "2049:2049"
      - "111:111"
    env_file:
      - deploy.env
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro


